<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHWH RO'I</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --black: #000000; --grey: #1a1a1a; }
        body { background-color: var(--black); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        header { border-bottom: 2px solid var(--gold); padding: 20px; text-align: center; color: var(--gold); }
        .container { padding: 20px; }
        .page { display: none; }
        .active { display: block; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px;}
        
        /* Style Contacts & Tchat */
        .member-card { background: var(--grey); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .msg-box { background: #333; padding: 10px; border-radius: 8px; margin-top: 5px; font-size: 14px; border: 1px dashed var(--gold); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); }
        .nav-item { color: var(--gold); text-align: center; cursor: pointer; font-size: 12px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: var(--black); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: var(--grey); border: 1px solid var(--gold); color: white; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-screen" style="display: none;">
    <div style="width: 80%; text-align: center;">
        <h1 style="color: var(--gold);">YHWH RO'I</h1>
        <input type="text" id="user-name" placeholder="Ton Nom">
        <input type="tel" id="user-phone" placeholder="Ton Numéro">
        <button class="btn-gold" onclick="connexion()">ENTRER</button>
    </div>
</div>

<header><h1>YHWH RO'I</h1></header>

<div class="container">
    <div id="page-bible" class="page active">
        <h2 style="color: var(--gold);">📖 Bible</h2>
        <select id="select-book" onchange="chargerBible()" style="width:100%; padding:10px; background:var(--grey); color:var(--gold); border:1px solid var(--gold);">
            <option value="GEN">Genèse</option>
            <option value="PSA">Psaumes</option>
            <option value="MAT">Matthieu</option>
            <option value="REV">Apocalypse</option>
        </select>
        <div id="bible-text" style="margin-top:20px;"></div>
    </div>

    <div id="page-social" class="page">
        <h2 style="color: var(--gold);">👥 Contacts & Tchat</h2>
        <div id="members-list">Chargement des membres...</div>
        <hr border="1" color="#FFD700">
        <h3 style="color: var(--gold);">📩 Mes Messages</h3>
        <div id="messages-recus"></div>
    </div>

    <div id="page-music" class="page">
        <h2 style="color: var(--gold);">🎶 Musique</h2>
        <p>Lecteur en cours de synchronisation...</p>
    </div>

    <div id="page-profil" class="page">
        <div style="text-align: center; background: var(--grey); padding: 20px; border-radius: 15px; border: 1px solid var(--gold);">
            <h2 id="display-name" style="color: var(--gold);"></h2>
            <p id="display-phone"></p>
            <button class="btn-gold" onclick="localStorage.clear(); location.reload();">Déconnexion</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item" onclick="changerPage('page-bible')"><i class="fas fa-book"></i>Bible</div>
    <div class="nav-item" onclick="changerPage('page-social')"><i class="fas fa-users"></i>Social</div>
    <div class="nav-item" onclick="changerPage('page-music')"><i class="fas fa-music"></i>Musique</div>
    <div class="nav-item" onclick="changerPage('page-profil')"><i class="fas fa-user"></i>Profil</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA0whfq-_NofiJ0Yw1adwpc_zA2hzHM3c",
    authDomain: "yhwh-ro-i.firebaseapp.com",
    projectId: "yhwh-ro-i",
    storageBucket: "yhwh-ro-i.appspot.com",
    messagingSenderId: "873669502065",
    appId: "1:873669502065:web:7b3718ed1c6e4d9e8c67d0"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // CONNEXION
  window.connexion = function() {
      const name = document.getElementById('user-name').value;
      const phone = document.getElementById('user-phone').value;
      if(name && phone) {
          localStorage.setItem('yhwh_user', name);
          localStorage.setItem('yhwh_phone', phone);
          // On enregistre dans Firebase
          set(ref(database, 'membres/' + phone), { nom: name, numero: phone });
          location.reload(); 
      }
  };

  // AFFICHAGE DES MEMBRES
  onValue(ref(database, 'membres'), (snapshot) => {
      const membersDiv = document.getElementById('members-list');
      membersDiv.innerHTML = "";
      snapshot.forEach((child) => {
          const m = child.val();
          if(m.numero !== localStorage.getItem('yhwh_phone')) {
              membersDiv.innerHTML += `
                <div class="member-card">
                    <span><b>${m.nom}</b></span>
                    <button onclick="envoyerMsg('${m.numero}', '${m.nom}')" style="background:var(--gold); border:none; border-radius:5px; padding:5px 10px;">Converser</button>
                </div>`;
          }
      });
  });

  // ENVOYER MESSAGE
  window.envoyerMsg = function(destId, destNom) {
      const t = prompt("Message pour " + destNom);
      if(t) {
          push(ref(database, 'messages'), {
              de: localStorage.getItem('yhwh_user'),
              pour: destId,
              texte: t
          });
          alert("Envoyé !");
      }
  };

  // RECEVOIR MESSAGES
  onValue(ref(database, 'messages'), (snapshot) => {
      const container = document.getElementById('messages-recus');
      container.innerHTML = "";
      snapshot.forEach((child) => {
          const msg = child.val();
          if(msg.pour === localStorage.getItem('yhwh_phone')) {
              container.innerHTML += `<div class="msg-box"><b>${msg.de} :</b> ${msg.texte}</div>`;
          }
      });
  });

  window.changerPage = (id) => {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
  };

  window.chargerBible = async () => {
      const book = document.getElementById('select-book').value;
      const res = await fetch(`https://bible-api.com/${book}+1?translation=lsg`);
      const data = await res.json();
      document.getElementById('bible-text').innerHTML = data.verses.map(v => `<p><b>${v.verse}</b> ${v.text}</p>`).join('');
  };

  if(!localStorage.getItem('yhwh_user')) {
      document.getElementById('login-screen').style.display = 'flex';
  } else {
      document.getElementById('display-name').innerText = localStorage.getItem('yhwh_user');
      document.getElementById('display-phone').innerText = localStorage.getItem('yhwh_phone');
  }
</script>
</body>
</html>
