<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHWH RO'I</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --black: #000000; --grey: #1a1a1a; --darker: #0d0d0d; }
        body { background-color: var(--black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* En-tête */
        header { border-bottom: 2px solid var(--gold); padding: 15px; text-align: center; color: var(--gold); background: var(--darker); position: sticky; top: 0; z-index: 100; }
        
        .container { padding: 15px; }
        .page { display: none; }
        .active { display: block; }

        /* Style Inscription */
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: var(--black); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 85%; text-align: center; background: var(--grey); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: var(--darker); border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }

        /* Boutons */
        .btn-gold { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-gold:active { transform: scale(0.95); }

        /* Tchat & Contacts */
        .contact-item { background: var(--grey); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; }
        .avatar { width: 45px; height: 45px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold); border: 1px solid var(--gold); }
        
        .msg-bubble { background: var(--grey); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--gold); max-width: 85%; }
        .msg-info { font-size: 11px; color: var(--gold); margin-bottom: 5px; display: block; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--darker); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--gold); }
        .nav-item { color: #888; text-align: center; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .nav-item.active-nav { color: var(--gold); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="login-screen" style="display: none;">
    <div class="login-box">
        <h1 style="color: var(--gold); margin-bottom: 5px;">YHWH RO'I</h1>
        <p style="font-size: 14px; opacity: 0.8;">Créez votre compte disciple</p>
        <input type="text" id="user-name" placeholder="Nom complet">
        <input type="tel" id="user-phone" placeholder="+225 00 00 00 00 00">
        <button class="btn-gold" onclick="connexion()">CRÉER MON COMPTE</button>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 20px;">YHWH RO'I</h2>
</header>

<div class="container">
    <div id="page-bible" class="page active">
        <h3 style="color: var(--gold);"><i class="fas fa-book-open"></i> Méditation</h3>
        <select id="select-book" onchange="chargerBible()" style="width:100%; padding:12px; background:var(--grey); color:white; border:1px solid var(--gold); border-radius:10px;">
            <option value="GEN">Genèse</option>
            <option value="PSA">Psaumes</option>
            <option value="MAT">Matthieu</option>
            <option value="JOH">Jean</option>
            <option value="REV">Apocalypse</option>
        </select>
        <div id="bible-text" style="margin-top:20px; font-size: 17px; line-height: 1.6;"></div>
    </div>

    <div id="page-social" class="page">
        <h3 style="color: var(--gold);"><i class="fas fa-comments"></i> Discussions</h3>
        <div id="members-list"></div>
        <hr style="border: 0.5px solid #222; margin: 20px 0;">
        <h3 style="color: var(--gold);"><i class="fas fa-inbox"></i> Boîte de réception</h3>
        <div id="messages-recus"></div>
    </div>

    <div id="page-music" class="page">
        <h3 style="color: var(--gold);"><i class="fas fa-music"></i> Louange</h3>
        <div class="contact-item">
            <span>Hillsong - Voici mon coeur</span>
            <i class="fas fa-play-circle" style="font-size: 25px; color: var(--gold);"></i>
        </div>
    </div>

    <div id="page-profil" class="page">
        <div style="text-align: center; background: var(--grey); padding: 30px; border-radius: 20px; border: 1px solid var(--gold);">
            <div class="avatar" style="width:70px; height:70px; margin: 0 auto 15px; font-size: 30px;"><i class="fas fa-user"></i></div>
            <h2 id="display-name" style="color: var(--gold); margin: 0;"></h2>
            <p id="display-phone" style="opacity: 0.6; margin: 5px 0;"></p>
            <p style="font-style: italic; font-size: 14px;">"L'Éternel est mon berger."</p>
            <button class="btn-gold" style="margin-top: 20px; background: #cc0000; color: white;" onclick="localStorage.clear(); location.reload();">DÉCONNEXION</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active-nav" id="nav-bible" onclick="changerPage('page-bible')"><i class="fas fa-bible"></i>Bible</div>
    <div class="nav-item" id="nav-social" onclick="changerPage('page-social')"><i class="fas fa-comment-dots"></i>Tchat</div>
    <div class="nav-item" id="nav-music" onclick="changerPage('page-music')"><i class="fas fa-music"></i>Musique</div>
    <div class="nav-item" id="nav-profil" onclick="changerPage('page-profil')"><i class="fas fa-user-circle"></i>Moi</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA0whfq-_NofiJ0Yw1adwpc_zA2hzHM3c",
    authDomain: "yhwh-ro-i.firebaseapp.com",
    projectId: "yhwh-ro-i",
    storageBucket: "yhwh-ro-i.appspot.com",
    messagingSenderId: "873669502065",
    appId: "1:873669502065:web:7b3718ed1c6e4d9e8c67d0"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  window.connexion = function() {
      const name = document.getElementById('user-name').value;
      const phone = document.getElementById('user-phone').value;
      if(name.length > 2 && phone.length > 7) {
          localStorage.setItem('yhwh_user', name);
          localStorage.setItem('yhwh_phone', phone);
          set(ref(database, 'membres/' + phone.replace(/[^0-9]/g, "")), { nom: name, numero: phone });
          location.reload(); 
      } else { alert("Veuillez entrer un nom et un vrai numéro."); }
  };

  onValue(ref(database, 'membres'), (snapshot) => {
      const list = document.getElementById('members-list');
      list.innerHTML = "";
      snapshot.forEach((child) => {
          const m = child.val();
          if(m.numero !== localStorage.getItem('yhwh_phone')) {
              list.innerHTML += `
                <div class="contact-item">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div class="avatar">${m.nom.charAt(0)}</div>
                        <b>${m.nom}</b>
                    </div>
                    <button onclick="envoyerMsg('${m.numero}', '${m.nom}')" style="background:none; border:1px solid var(--gold); color:var(--gold); border-radius:8px; padding:8px 12px; cursor:pointer;">Message</button>
                </div>`;
          }
      });
  });

  window.envoyerMsg = function(destId, destNom) {
      const t = prompt("Écrire à " + destNom + " :");
      if(t) {
          push(ref(database, 'messages'), {
              de: localStorage.getItem('yhwh_user'),
              pour: destId,
              texte: t,
              date: new Date().toLocaleTimeString()
          });
          alert("Message envoyé !");
      }
  };

  onValue(ref(database, 'messages'), (snapshot) => {
      const container = document.getElementById('messages-recus');
      container.innerHTML = "";
      snapshot.forEach((child) => {
          const msg = child.val();
          if(msg.pour === localStorage.getItem('yhwh_phone')) {
              container.innerHTML += `
                <div class="msg-bubble">
                    <span class="msg-info">De : ${msg.de} • ${msg.date}</span>
                    ${msg.texte}
                </div>`;
          }
      });
  });

  window.changerPage = (id) => {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
      document.getElementById(id).classList.add('active');
      document.getElementById('nav-' + id.split('-')[1]).classList.add('active-nav');
  };

  window.chargerBible = async () => {
      const book = document.getElementById('select-book').value;
      const res = await fetch(`https://bible-api.com/${book}+1?translation=lsg`);
      const data = await res.json();
      document.getElementById('bible-text').innerHTML = data.verses.map(v => `<p><b style="color:var(--gold)">${v.verse}</b> ${v.text}</p>`).join('');
  };

  if(!localStorage.getItem('yhwh_user')) {
      document.getElementById('login-screen').style.display = 'flex';
  } else {
      document.getElementById('display-name').innerText = localStorage.getItem('yhwh_user');
      document.getElementById('display-phone').innerText = localStorage.getItem('yhwh_phone');
  }
</script>
</body>
</html>
