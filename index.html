<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHWH RO'I</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --black: #000000; --grey: #1a1a1a; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding-bottom: 120px; }
        header { border-bottom: 2px solid var(--gold); padding: 15px; text-align: center; color: var(--gold); font-weight: bold; }
        .container { padding: 15px; }
        .page { display: none; }
        .active { display: block; }
        
        /* Stories */
        .stories-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
        .story-circle { min-width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; background: var(--grey); }

        /* Tchat */
        .member-card { background: var(--grey); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .chat-input-area { position: fixed; bottom: 75px; width: 100%; background: #111; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #333; box-sizing: border-box; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--gold); background: #000; color: white; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); }
        .nav-item { color: var(--gold); text-align: center; font-size: 12px; cursor: pointer; }
        .btn-send { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; color: black; font-size: 18px; }
    </style>
</head>
<body>

<header>YHWH RO'I</header>

<div class="container">
    <div id="page-social" class="page active">
        <div class="stories-container" id="stories-list">
            <div class="story-circle" onclick="ajouterStory()">+<br>Story</div>
        </div>
        
        <h3 style="color: var(--gold);">Discussions</h3>
        <div id="members-list">Chargement des disciples...</div>
        
        <div id="chat-box" style="margin-top:20px;">
            <h3 style="color: var(--gold);">Messages reçus</h3>
            <div id="messages-display"></div>
        </div>
    </div>

    <div class="chat-input-area" id="input-bar">
        <input type="text" id="msg-text" placeholder="Écrire un message de foi...">
        <button class="btn-send" onclick="envoyerMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item" onclick="changerPage('page-bible')"><i class="fas fa-book"></i><br>Bible</div>
    <div class="nav-item" onclick="changerPage('page-social')"><i class="fas fa-users"></i><br>Tchat</div>
    <div class="nav-item" onclick="changerPage('page-music')"><i class="fas fa-music"></i><br>Musique</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA0whfq-_NofiJ0Yw1adwpc_zA2hzHM3c",
    authDomain: "yhwh-ro-i.firebaseapp.com",
    projectId: "yhwh-ro-i",
    storageBucket: "yhwh-ro-i.appspot.com",
    messagingSenderId: "873669502065",
    appId: "1:873669502065:web:7b3718ed1c6e4d9e8c67d0"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  let dest actuel = "";

  // 1. Inscription auto pour le test
  if(!localStorage.getItem('yhwh_user')){
      let n = prompt("Ton nom :");
      let p = prompt("Ton numéro :");
      if(n && p){
          localStorage.setItem('yhwh_user', n);
          localStorage.setItem('yhwh_phone', p);
          set(ref(database, 'membres/' + p), { nom: n, numero: p });
      }
  }

  // 2. Liste des membres
  onValue(ref(database, 'membres'), (snapshot) => {
      const list = document.getElementById('members-list');
      list.innerHTML = "";
      snapshot.forEach((child) => {
          const m = child.val();
          if(m.numero !== localStorage.getItem('yhwh_phone')){
              list.innerHTML += `<div class="member-card" onclick="preparerMessage('${m.numero}', '${m.nom}')">
                  <b>${m.nom}</b>
                  <i class="fas fa-chevron-right" style="color:var(--gold)"></i>
              </div>`;
          }
      });
  });

  window.preparerMessage = (num, nom) => {
      dest = num;
      document.getElementById('msg-text').placeholder = "Message à " + nom;
      document.getElementById('msg-text').focus();
  };

  window.envoyerMessage = () => {
      const texte = document.getElementById('msg-text').value;
      if(texte && dest){
          push(ref(database, 'messages'), {
              de: localStorage.getItem('yhwh_user'),
              pour: dest,
              texte: texte,
              date: new Date().toLocaleTimeString()
          });
          document.getElementById('msg-text').value = "";
          alert("Envoyé !");
      } else { alert("Choisis un contact d'abord !"); }
  };

  // 3. Affichage messages
  onValue(ref(database, 'messages'), (snapshot) => {
      const display = document.getElementById('messages-display');
      display.innerHTML = "";
      snapshot.forEach((child) => {
          const msg = child.val();
          if(msg.pour === localStorage.getItem('yhwh_phone')){
              display.innerHTML += `<div style="background:#222; padding:10px; border-radius:10px; margin-bottom:10px; border-left:3px solid var(--gold)">
                  <small style="color:var(--gold)">${msg.de}</small><br>${msg.texte}
              </div>`;
          }
      });
  });

  window.changerPage = (id) => {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.getElementById('input-bar').style.display = (id === 'page-social') ? 'flex' : 'none';
  };
</script>
</body>
</html>
